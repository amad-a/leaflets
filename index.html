    <script type="module">
      function getRandomNonRepeatingElements(arr, n) {
        // 1. Create a copy of the array
        const shuffledArray = [...arr];

        // 2. Shuffle the copied array using Fisher-Yates (Knuth) shuffle algorithm
        for (let i = shuffledArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffledArray[i], shuffledArray[j]] = [
            shuffledArray[j],
            shuffledArray[i],
          ]; // Swap elements
        }

        // 3. Extract the first n elements
        return shuffledArray.slice(0, n);
      }

      let zIndex = 1000000;
      let lowestZindex = 1000000;

      // const dragInstances = new NeoDrag.Draggable(document.querySelectorAll('.drag'));
      // console.log('draggy', dragInstance);
      function getRandomInt(max) {
        return Math.floor(Math.random() * max);
      }

      function getRandomIntInclusive(min, max) {
        min = Math.ceil(min); // Ensure min is an integer
        max = Math.floor(max); // Ensure max is an integer
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      // a 1-11 b 1-10 c 1-8
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;

      let falling = true;

      TweenLite.set('#container', { perspective: 1000 });
      TweenLite.set('img', { xPercent: '-50%', yPercent: '-50%' });

      var total = 100;
      var container = document.getElementById('container'),
        w = window.innerWidth,
        h = window.innerHeight;

      for (let i = 0; i < 12; i++) {
        var Div = document.createElement('img');
        Div.src = `public/leaflets/2.png`;
        Div.onclick = () => console.log('pop');
        Div.style.zIndex = '69';
        Div.style.opacity = `${75 + getRandomInt(25)}%`;
        // Div.style.zIndex = `${getRandomIntInclusive(800000, 1200000)}`;
        TweenLite.set(Div, {
          attr: { class: 'petal' },
          x: R(0, w),
          y: R(-200, -150),
          z: R(-200, 200),
        });
        container.appendChild(Div);
        animm(Div);
      }

      function animm(elm) {
        const tweens = [
          TweenMax.to(elm, R(6, 15), {
            y: h + 100,
            ease: Linear.easeNone,
            repeat: -1,
            delay: 0,
          }),
          TweenMax.to(elm, R(4, 8), {
            x: '+=100',
            rotationZ: R(0, 60),
            repeat: -1,
            yoyo: true,
            ease: Sine.easeInOut,
          }),
          TweenMax.to(elm, R(2, 8), {
            rotationX: R(0, 180),
            rotationY: R(0, 90),
            repeat: -1,
            yoyo: true,
            ease: Sine.easeInOut,
            delay: -5,
          }),
        ];

        elm.addEventListener('mouseenter', () => {
          tweens.forEach((t) => t.pause());
          elm.style.outline = '2px solid #4AF626';
        });

        elm.addEventListener('mouseleave', () => {
          tweens.forEach((t) => t.resume());
          elm.style.outline = 'none';
        });
      }
      function R(min, max) {
        return min + Math.random() * (max - min);
      }
    </script>
