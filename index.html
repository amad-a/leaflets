<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>KHAJISTAN O.W.I.</title>
    <script src="./gsap.min.js"></script>
    <script defer type="module" src="./leaflets.js"></script>
  </head>

  <style>
    body {
      font-family: 'VGA';
      color: #00a606;
      -webkit-user-select: none; /* Safari */
      -ms-user-select: none; /* Internet Explorer/Edge */
      user-select: none; /* Standard syntax (Chrome, Firefox, Opera) */
      background-color: black;
      image-rendering: pixelated;
      background-blend-mode: lighten;
    }

    html,
    body,
    #container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0px;
      margin: 0px;
    }

    @font-face {
      font-family: 'VGA';
      src: url('public/fonts/Web437_IBM_VGA_8x16.woff') format('woff');
    }

    img {
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
    }

    img.leaf {
      image-rendering: pixelated;
      width: 125px;
      aspect-ratio: initial;
      /* height: 100px; */
      position: absolute;
      background-repeat: repeat;
      padding: 10px;
    }

    .leaf:hover {
      cursor: crosshair;
    }

    /* Tooltip text */
    .tooltiptext {
      visibility: hidden;
      /* Hidden by default */
      width: 130px;
      background-color: black;
      color: #ffffff;
      text-align: center;
      padding: 5px 0;
      border-radius: 6px;
      position: relative;
      z-index: 1;
      /* Ensure tooltip is displayed above content */
    }

    .hover-text-container {
      pointer-events: none;
      visibility: hidden;

      z-index: 999999998;
      /* margin-top: 50px; */
      -webkit-font-smoothing: none;
      font-family: 'VGA';
      font-weight: normal;
      color: #00a606;
      position: absolute;
      display: flex;
      width: 100%;
      font-size: 45px;
      justify-content: center;
      align-items: center;
      zoom: 0.65;
      height: 100%;
      /* Optional: define font weight */
      /* font-style: normal; */
    }

    .hover-text {
      background-color: black;

      border: 3px solid #00a606;
      padding: 20px 28px;
    }

    /* Show the tooltip text on hover */
    .img-container:hover .tooltiptext {
      visibility: visible;
    }

    .leaflet-input {
      all: unset;
      width: 100%;
    }

    .input-holder {
      bottom: 20px;
      width: 200px;
      font-size: 24px;
      padding: 10px 10px;
      height: fit-content;
      font-family: 'VGA';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      position: fixed;
      z-index: 999999999;
      background-color: black;
      border: 2px solid #00a606;
      color: #00a606;
      display: flex;
      gap: 6px;
    }

    .leaflet-input::selection {
      background-color: #00a606;
      color: black;
    }

    .input-not-found {
      color: #d30000;
    }

    .input-not-found::selection {
      background-color: #d30000;
      color: black;
    }

    .dialog-container {
      top: 0;
      position: absolute;
      height: 100vh;
      width: 100vw;
      display: flex;
      background-color: black;
      /* opacity: 75%; */
      z-index: 9999999999;
      align-items: center;
      justify-content: center;
      background-color: rgb(0, 0, 0, 0.75);
    }

    .hidden {
      display: none;
    }

    @keyframes expandFromCenter {
      0% {
        transform: scale(0);
        transform-origin: center center;
      }

      1% {
        transform: scale(0);
        transform-origin: center center;
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .leaflet-dialog {
      height: calc(100vh - 80px);
      width: calc(100vw - 80px);
      border: 2px solid #00a606;
      background-color: black;
      animation: fadeIn 0.2s ease-in-out forwards;
      display: flex;
      align-items: top;
      justify-content: flex-start;
      /* padding: 30px; */
      flex-direction: column;
    }

    .leaflet-image-full {
      max-width: -webkit-fill-available;
    }

    .dialog-header {
      border-bottom: 2px solid #00a606;
      color: #00a606;
      /* padding: 5px; */
      text-align: center;
      font-size: 24px;
      display: flex;
      justify-content: space-between;
      padding: 6px 4px 4px 5px;
    }

    .dialog-header-title {
      width: 100%;
      padding-left: 20px;
    }

    .dialog-header-x {
      margin-left: auto;
      padding: 0px 4px;
    }

    .dialog-header-x:hover {
      cursor: pointer;
      opacity: 0.5;
    }

    .dialog-img-container {
      padding: 10px;
      display: flex;
      justify-content: center;
      height: 33%;
    }

    .metadata-container {
      display: flex;
      border-top: 2px solid #00a606;
      overflow-x: hidden;
      font-size: 20px;
      height: -webkit-fill-available;
    }

    .meta {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: scroll;
      padding: 15px;
      gap: 15px;
      overscroll-behavior: none;
    }

    ::-webkit-scrollbar {
      -webkit-appearance: none;
      width: 4px;
    }

    /* The draggable part */
    ::-webkit-scrollbar-thumb {
      background-color: #00a606;
      border-radius: 0px;
    }

    /* The background track */
    ::-webkit-scrollbar-track {
      background: #000;
    }

    input:focus,
    textarea:focus {
      outline: none;
    }

    input::placeholder {
      color: #00a606;
      opacity: 0.5;
      /* font-style: italic; */
    }

    .meta-title {
      font-style: italic;
      opacity: 0.75;
    }

    .meta.short {
      border-right: 2px solid #00a606;
    }

    /* 1. Define the animation steps */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>

  <body>
    <div class="input-holder">
      <div>></div>
      <input
        id="input"
        placeholder="Enter Leaflet #"
        type="text"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        maxlength="3"
        class="leaflet-input"
        autocomplete="one-time-code"
        autofocus
      />
    </div>

    <div class="hover-text-container">
      <div class="hover-text">Click leaflet to view.</div>
    </div>
    <div id="container"></div>
    <div class="dialog-container hidden">
      <div class="leaflet-dialog">
        <div class="dialog-header">
          <div class="dialog-header-title"></div>
          <div class="dialog-header-x">X</div>
        </div>
        <div class="dialog-img-container">
          <img class="leaflet-image-full" />
        </div>
        <div class="metadata-container">
          <div class="meta short">
            <div id="operation">
              <span class="meta-title">Operation:</span>
              <span class="meta-content"></span>
            </div>
            <div id="conflict">
              <span class="meta-title">Conflict:</span>
              <span class="meta-content"></span>
            </div>
            <div id="year">
              <span class="meta-title">Year:</span>
              <span class="meta-content"></span>
            </div>
            <div id="country-theater">
              <span class="meta-title">Country/Theater:</span>
              <span class="meta-content"></span>
            </div>
            <div id="languages">
              <span class="meta-title">Languages:</span>
              <span class="meta-content"></span>
            </div>
            <div id="message-type">
              <span class="meta-title">Message Type:</span>
              <span class="meta-content"></span>
            </div>
            <div id="target-audience">
              <span class="meta-title">Target Audience:</span>
              <span class="meta-content"></span>
            </div>
            <div id="call-to-action">
              <span class="meta-title">Call to Action:</span>
              <span class="meta-content"></span>
            </div>
            <div id="key-figures-symbols">
              <span class="meta-title">Key Figures Symbols:</span>
              <span class="meta-content"></span>
            </div>
          </div>
          <div class="meta long">
            <div id="translation">
              <span class="meta-title">Translation:</span>
              <span class="meta-content"></span>
            </div>
            <div id="objective">
              <span class="meta-title">Objective:</span>
              <span class="meta-content"></span>
            </div>
            <div id="imagery">
              <span class="meta-title">Imagery:</span>
              <span class="meta-content"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import leaflets from './leaflets.js';
      let inputNum = '';
      let curLeaflet;

      const dialogContainer = document.querySelector(
        '.dialog-container',
      );

      const leafletImageFull = document.querySelector(
        '.leaflet-image-full',
      );

      const leafletX = document.querySelector('.dialog-header-x');

      leafletX.addEventListener('pointerdown', (event) => {
        dialogContainer.classList.add('hidden');
      });

      leafletImageFull.addEventListener('load', function () {
        this.naturalHeight > this.naturalWidth
          ? console.log('tall')
          : console.log('wide');
      });

      dialogContainer.addEventListener('click', (event) => {
        // Only execute if the clicked element is the parent itself
        if (event.target === event.currentTarget) {
          dialogContainer.classList.add('hidden');
        }
      });

      document
        .querySelector('.leaflet-input')
        .addEventListener('input', (e) => {
          inputNum = e.target.value;
          if (leafletLabels.includes(inputNum) || inputNum === '') {
            document
              .querySelector('.leaflet-input')
              .classList.remove('input-not-found');
          } else {
            document
              .querySelector('.leaflet-input')
              .classList.add('input-not-found');
          }
        });

      function getRandomNonRepeatingElements(arr, n) {
        // 1. Create a copy of the array
        const shuffledArray = [...arr];

        // 2. Shuffle the copied array using Fisher-Yates (Knuth) shuffle algorithm
        for (let i = shuffledArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffledArray[i], shuffledArray[j]] = [
            shuffledArray[j],
            shuffledArray[i],
          ]; // Swap elements
        }

        // 3. Extract the first n elements
        return shuffledArray.slice(0, n);
      }

      let zIndex = 1000000;
      let lowestZindex = 1000000;

      // const dragInstances = new NeoDrag.Draggable(document.querySelectorAll('.drag'));
      // console.log('draggy', dragInstance);
      function getRandomInt(max) {
        return Math.floor(Math.random() * max);
      }

      function getRandomIntInclusive(min, max) {
        min = Math.ceil(min); // Ensure min is an integer
        max = Math.floor(max); // Ensure max is an integer
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;

      TweenLite.set('#container', { perspective: 1000 });
      TweenLite.set('img', { xPercent: '-50%', yPercent: '-50%' });

      let total = 100;
      let container = document.getElementById('container'),
        w = window.innerWidth,
        h = window.innerHeight;

      let leafletLabels = [
        '4',
        '6',
        '14',
        '30',
        '32',
        '40',
        '71',
        '93',
        '115',
        '123',
        '124',
        '136',
        '139',
        '140',
        '145',
        '155',
        '160',
        '165',
        '168',
        '173',
        '177',
        '181',
        '189',
        '194',
        '201',
        '212',
        '220',
        '257',
        '258',
        '265',
        '282',
        '286',
        '292',
        '305',
        '308',
      ];

      for (let i = 0; i < 6; i++) {
        let img = document.createElement('img');
        img.id = i;
        img.classList.add('leafy');
        let imgContainer = document.createElement('div');

        let randomLeaflet = `public/leaflets/leaflets-sm/dithered/${leafletLabels[Math.floor(Math.random() * leafletLabels.length)]}.png`;

        let tooltip = document.createElement('span');

        imgContainer.className = 'img-container';
        img.src = randomLeaflet;
        // img.style
        img.onclick = (e) => {
          curLeaflet = leaflets.find(
            (leaflet) =>
              leaflet['catalog-number'] ===
              e.target.dataset.leafletId,
          );

          const metaContainer = document.querySelector('.meta.short');

          document.querySelector(
            '#operation > .meta-content',
          ).innerHTML = ' ' + curLeaflet['operation'] || 'N/A';
          document.querySelector(
            '#conflict > .meta-content',
          ).innerHTML = ' ' + curLeaflet['conflict'] || 'N/A';
          document.querySelector('#year > .meta-content').innerHTML =
            ' ' + curLeaflet['year'] || 'N/A';
          document.querySelector(
            '#country-theater > .meta-content',
          ).innerHTML = ' ' + curLeaflet['country-theater'] || 'N/A';
          document.querySelector(
            '#languages > .meta-content',
          ).innerHTML =
            ' ' + curLeaflet['languages'].join(', ') || 'N/A';
          document.querySelector(
            '#message-type > .meta-content',
          ).innerHTML = ' ' + curLeaflet['message-type'] || 'N/A';
          document.querySelector(
            '#target-audience > .meta-content',
          ).innerHTML = ' ' + curLeaflet['target-audience'] || 'N/A';
          document.querySelector(
            '#call-to-action > .meta-content',
          ).innerHTML = ' ' + curLeaflet['call-to-action'] || 'N/A';
          document.querySelector(
            '#key-figures-symbols > .meta-content',
          ).innerHTML =
            ' ' + curLeaflet['key-figures-symbols'].join(', ') ||
            'N/A';
          document.querySelector(
            '#translation > .meta-content',
          ).innerHTML = ' ' + curLeaflet['translation'] || 'N/A';
          document.querySelector(
            '#objective > .meta-content',
          ).innerHTML = ' ' + curLeaflet['objective'] || 'N/A';
          document.querySelector(
            '#imagery > .meta-content',
          ).innerHTML = ' ' + curLeaflet['imagery'] || 'N/A';

          document.querySelector('.dialog-header-title').innerHTML =
            'Leaflet ' + curLeaflet['catalog-number'];

          document
            .querySelector('.dialog-container')
            .classList.remove('hidden');

          const metas = document.querySelectorAll('.meta');

          for (let meta of metas) {
            meta.scrollTo({ top: 0 });
          }
        };
        img.style.zIndex = '69';
        img.style.width = '250px';
        // img.style.opacity = `${85 + getRandomInt(15)}%`;
        // img.style.opacity = `100`;
        // img.style.opacity = '.10';
        TweenLite.set(img, {
          attr: { class: 'leaf' },
          x: R(0, w),
          y: R(-500, -450),
          z: R(-200, 200),
        });

        imgContainer.appendChild(img);

        container.appendChild(imgContainer);
        animm(img);
      }

      const imgContainers = document.querySelectorAll('.leaf');

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) {
              if (leafletLabels.includes(inputNum)) {
                entry.target.src = `public/leaflets/leaflets-sm/dithered/${inputNum}.png`;
                entry.target.dataset.leafletId = inputNum;
              } else {
                const randomLeafletId =
                  leafletLabels[
                    Math.floor(Math.random() * leafletLabels.length)
                  ];
                entry.target.src = `public/leaflets/leaflets-sm/dithered/${randomLeafletId}.png`;
                entry.target.dataset.leafletId = randomLeafletId;
              }
            }
          });
        },
        { threshold: 0 },
      );

      imgContainers.forEach((img) => {
        observer.observe(img);
      });

      function animm(elm) {
        const tweens = [
          TweenMax.to(elm, R(6, 15), {
            y: h + 100,
            ease: Linear.easeNone,
            repeat: -1,
            delay: 0,
          }),
          TweenMax.to(elm, R(4, 8), {
            x: '+=100',
            rotationZ: R(0, 60),
            repeat: -1,
            yoyo: true,
            ease: Sine.easeInOut,
          }),
          TweenMax.to(elm, R(2, 8), {
            rotationX: R(0, 180),
            rotationY: R(0, 90),
            repeat: -1,
            yoyo: true,
            ease: Sine.easeInOut,
            delay: -5,
          }),
        ];

        const hoverTextContainer = document.querySelector(
          '.hover-text-container',
        );

        elm.addEventListener('mousemove', () => {
          if (hoverTextContainer.style.visibility !== 'visible') {
            tweens.forEach((t) => t.pause());
            elm.style.outline = '3px solid #00a606';
            hoverTextContainer.style.visibility = 'visible';
            document.querySelector('.leaflet-image-full').src =
              `public/leaflets/leaflets-lg/${elm.dataset.leafletId}.jpeg`;
          }
        });

        elm.addEventListener('mouseleave', () => {
          tweens.forEach((t) => t.resume());
          elm.style.outline = 'none';
          document.querySelector(
            '.hover-text-container',
          ).style.visibility = 'hidden';
        });
      }
      function R(min, max) {
        return min + Math.random() * (max - min);
      }

      let timerID = null;
      let timeoutDuration = 600000; // 10 minute

      window.addEventListener(
        'keydown',
        function (e) {
          if (timerID !== null) {
            clearTimeout(timerID);
            timerID = null;
          }

          timerID = setTimeout(function () {
            // Clear all the fields here
            document.getElementById('input').value = '';
            inputNum = '';
          }, timeoutDuration);
        },
        false,
      );
    </script>
  </body>
</html>
