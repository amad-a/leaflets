<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KHAJISTAN O.W.I.</title>
    <script src="./gsap.min.js"></script>
    <script defer type="module" src="./leaflets.js"></script>
  </head>

  <style>
    body {
      font-family: 'VGA';
      color: #00a606;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      background-color: black;
      image-rendering: pixelated;
      background-blend-mode: lighten;
    }

    html,
    body,
    #container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0px;
      margin: 0px;
    }

    @font-face {
      font-family: 'VGA';
      src: url('public/fonts/Web437_IBM_VGA_8x16.woff') format('woff');
    }

    img {
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
    }

    img.leaf {
      image-rendering: pixelated;
      width: 125px;
      aspect-ratio: initial;
      position: absolute;
      background-repeat: repeat;
      padding: 10px;
    }

    .leaf:hover {
      cursor: crosshair;
    }

    .tooltiptext {
      visibility: hidden;
      width: 130px;
      background-color: black;
      color: #ffffff;
      text-align: center;
      padding: 5px 0;
      border-radius: 6px;
      position: relative;
      z-index: 1;
    }

    .hover-text-container {
      pointer-events: none;
      visibility: hidden;
      z-index: 999999998;
      -webkit-font-smoothing: none;
      font-family: 'VGA';
      font-weight: normal;
      color: #00a606;
      position: absolute;
      display: flex;
      width: 100%;
      font-size: 45px;
      justify-content: center;
      align-items: center;
      zoom: 0.65;
      height: 100%;
    }

    .hover-text {
      background-color: black;
      border: 3px solid #00a606;
      padding: 20px 28px;
    }

    .img-container:hover .tooltiptext {
      visibility: visible;
    }

    .leaflet-input {
      all: unset;
      width: 100%;
    }

    .input-holder {
      bottom: 20px;
      width: 200px;
      font-size: 24px;
      padding: 10px 10px;
      height: fit-content;
      font-family: 'VGA';
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999999;
      background-color: black;
      border: 2px solid #00a606;
      color: #00a606;
      display: flex;
      gap: 6px;
    }

    .leaflet-input::selection {
      background-color: #00a606;
      color: black;
    }

    .input-not-found {
      color: #d30000;
    }

    .input-not-found::selection {
      background-color: #d30000;
      color: black;
    }

    .dialog-container {
      top: 0;
      position: absolute;
      height: 100vh;
      width: 100vw;
      display: flex;
      z-index: 9999999999;
      align-items: center;
      justify-content: center;
      background-color: rgb(0, 0, 0, 0.55);
    }

    .hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .leaflet-dialog {
      height: calc(100vh - 90px);
      width: calc(100vw - 90px);
      border: 2px solid #00a606;
      background-color: black;
      animation: fadeIn 0.2s ease-in-out forwards;
      display: flex;
      align-items: top;
      justify-content: flex-start;
      flex-direction: column;
    }

    .leaflet-image-full {
      max-width: -webkit-fill-available;
    }

    .dialog-header {
      border-bottom: 2px solid #00a606;
      color: #00a606;
      text-align: center;
      font-size: 24px;
      display: flex;
      justify-content: space-between;
      padding: 6px 4px 4px 5px;
    }

    .dialog-header-title {
      width: 100%;
      padding-left: 20px;
    }

    .dialog-header-x {
      margin-left: auto;
      padding: 0px 4px;
    }

    .dialog-header-x:hover {
      cursor: pointer;
      opacity: 0.5;
    }

    .dialog-img-container {
      padding: 10px;
      display: flex;
      justify-content: center;
      height: 33%;
    }

    .metadata-container {
      display: flex;
      border-top: 2px solid #00a606;
      overflow-x: hidden;
      font-size: 20px;
      height: -webkit-fill-available;
    }

    .meta {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: scroll;
      padding: 15px;
      gap: 15px;
      overscroll-behavior: none;
    }

    ::-webkit-scrollbar {
      -webkit-appearance: none;
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #00a606;
      border-radius: 0px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    input:focus,
    textarea:focus {
      outline: none;
    }

    input::placeholder {
      color: #00a606;
      opacity: 0.5;
    }

    .meta-title {
      font-style: italic;
      opacity: 0.75;
    }

    .meta.short {
      border-right: 2px solid #00a606;
    }
  </style>

  <body>
    <div class="input-holder">
      <div>></div>
      <input
        id="input"
        placeholder="Enter Leaflet #"
        type="text"
        maxlength="3"
        class="leaflet-input"
        autocomplete="one-time-code"
        autofocus
      />
    </div>

    <div class="hover-text-container">
      <div class="hover-text">Click leaflet to view.</div>
    </div>
    <div id="container"></div>
    <div class="dialog-container hidden">
      <div class="leaflet-dialog">
        <div class="dialog-header">
          <div class="dialog-header-title"></div>
          <div class="dialog-header-x">X</div>
        </div>
        <div class="dialog-img-container">
          <img class="leaflet-image-full" />
        </div>
        <div class="metadata-container">
          <div class="meta short">
            <div id="operation">
              <span class="meta-title">Operation:</span>
              <span class="meta-content"></span>
            </div>
            <div id="conflict">
              <span class="meta-title">Conflict:</span>
              <span class="meta-content"></span>
            </div>
            <div id="year">
              <span class="meta-title">Year:</span>
              <span class="meta-content"></span>
            </div>
            <div id="country-theater">
              <span class="meta-title">Country/Theater:</span>
              <span class="meta-content"></span>
            </div>
            <div id="languages">
              <span class="meta-title">Languages:</span>
              <span class="meta-content"></span>
            </div>
            <div id="message-type">
              <span class="meta-title">Message Type:</span>
              <span class="meta-content"></span>
            </div>
            <div id="target-audience">
              <span class="meta-title">Target Audience:</span>
              <span class="meta-content"></span>
            </div>
            <div id="call-to-action">
              <span class="meta-title">Call to Action:</span>
              <span class="meta-content"></span>
            </div>
            <div id="key-figures-symbols">
              <span class="meta-title">Key Figures Symbols:</span>
              <span class="meta-content"></span>
            </div>
          </div>
          <div class="meta long">
            <div id="translation">
              <span class="meta-title">Translation:</span>
              <span class="meta-content"></span>
            </div>
            <div id="objective">
              <span class="meta-title">Objective:</span>
              <span class="meta-content"></span>
            </div>
            <div id="imagery">
              <span class="meta-title">Imagery:</span>
              <span class="meta-content"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import leaflets from './leaflets.js';

      // ── Constants ──────────────────────────────────────────────
      const FALLING_LEAF_COUNT = 6;
      const LEAF_WIDTH = '250px';
      const IDLE_TIMEOUT_MS = 600_000; // 10 minutes

      const LEAFLET_IDS = [
        '4', '6', '14', '30', '32', '40', '71', '93', '115', '123',
        '124', '136', '139', '140', '145', '155', '160', '165', '168',
        '173', '177', '181', '189', '194', '201', '212', '220', '257',
        '258', '265', '282', '286', '292', '305', '308',
      ];

      const METADATA_FIELDS = [
        { id: 'operation',           key: 'operation' },
        { id: 'conflict',            key: 'conflict' },
        { id: 'year',                key: 'year' },
        { id: 'country-theater',     key: 'country-theater' },
        { id: 'languages',           key: 'languages',           isArray: true },
        { id: 'message-type',        key: 'message-type' },
        { id: 'target-audience',     key: 'target-audience' },
        { id: 'call-to-action',      key: 'call-to-action' },
        { id: 'key-figures-symbols', key: 'key-figures-symbols', isArray: true },
        { id: 'translation',         key: 'translation' },
        { id: 'objective',           key: 'objective' },
        { id: 'imagery',             key: 'imagery' },
      ];

      // ── Cached DOM Elements ────────────────────────────────────
      const dom = {
        container:          document.getElementById('container'),
        input:              document.getElementById('input'),
        dialogContainer:    document.querySelector('.dialog-container'),
        dialogTitle:        document.querySelector('.dialog-header-title'),
        dialogClose:        document.querySelector('.dialog-header-x'),
        dialogImage:        document.querySelector('.leaflet-image-full'),
        hoverTextContainer: document.querySelector('.hover-text-container'),
        metaPanels:         document.querySelectorAll('.meta'),
      };

      // ── State ──────────────────────────────────────────────────
      let currentLeaflet = null;
      let idleTimerId = null;

      // ── Helpers ────────────────────────────────────────────────
      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function pickRandomId() {
        return LEAFLET_IDS[Math.floor(Math.random() * LEAFLET_IDS.length)];
      }

      function thumbPath(id) {
        return `public/leaflets/leaflets-sm/dithered/${id}.png`;
      }

      function fullPath(id) {
        return `public/leaflets/leaflets-lg/${id}.jpeg`;
      }

      // ── Dialog ─────────────────────────────────────────────────
      function openDialog(id) {
        const leaflet = leaflets.find((l) => l['catalog-number'] === id);
        if (!leaflet) return;

        currentLeaflet = leaflet;
        dom.dialogImage.src = fullPath(id);
        dom.dialogTitle.textContent = `Leaflet ${id}`;

        for (const field of METADATA_FIELDS) {
          const el = document.querySelector(`#${field.id} > .meta-content`);
          if (!el) continue;

          const raw = leaflet[field.key];
          const value = field.isArray
            ? (Array.isArray(raw) ? raw.join(', ') : 'N/A')
            : (raw || 'N/A');
          el.textContent = ` ${value}`;
        }

        // Reset scroll positions
        for (const panel of dom.metaPanels) {
          panel.scrollTo({ top: 0 });
        }

        dom.dialogContainer.classList.remove('hidden');
      }

      function closeDialog() {
        dom.dialogContainer.classList.add('hidden');
        dom.input.value = '';
        currentLeaflet = null;
      }

      // ── Dialog Event Listeners ─────────────────────────────────
      dom.dialogClose.addEventListener('pointerdown', closeDialog);

      dom.dialogContainer.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeDialog();
      });

      // ── Input Handling ─────────────────────────────────────────
      dom.input.addEventListener('input', (e) => {
        // Strip non-numeric characters
        e.target.value = e.target.value.replace(/[^0-9]/g, '');

        const value = e.target.value;
        if (value && LEAFLET_IDS.includes(value)) {
          openDialog(value);
        }
      });

      // ── Idle Timer (clears input after inactivity) ─────────────
      window.addEventListener('keydown', () => {
        if (idleTimerId !== null) {
          clearTimeout(idleTimerId);
        }
        idleTimerId = setTimeout(() => {
          dom.input.value = '';
        }, IDLE_TIMEOUT_MS);
      });

      // ── Falling Leaves Animation ───────────────────────────────
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;

      gsap.set('#container', { perspective: 1000 });
      gsap.set('img', { xPercent: '-50%', yPercent: '-50%' });

      function createFallingLeaf() {
        const img = document.createElement('img');
        img.classList.add('leaf');
        img.src = thumbPath(pickRandomId());
        img.style.zIndex = '69';
        img.style.width = LEAF_WIDTH;

        img.addEventListener('click', (e) => {
          const id = e.target.dataset.leafletId;
          if (id) openDialog(id);
        });

        gsap.set(img, {
          attr: { class: 'leaf' },
          x: randomInRange(0, viewW),
          y: randomInRange(-500, -450),
          z: randomInRange(-200, 200),
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'img-container';
        wrapper.appendChild(img);
        dom.container.appendChild(wrapper);

        animateLeaf(img);
        return img;
      }

      function animateLeaf(el) {
        const tweens = [
          gsap.to(el, {
            y: viewH + 100,
            ease: 'none',
            repeat: -1,
            delay: 0,
            duration: randomInRange(6, 15),
          }),
          gsap.to(el, {
            x: '+=100',
            rotationZ: randomInRange(0, 60),
            repeat: -1,
            yoyo: true,
            ease: 'sine.inOut',
            duration: randomInRange(4, 8),
          }),
          gsap.to(el, {
            rotationX: randomInRange(0, 180),
            rotationY: randomInRange(0, 90),
            repeat: -1,
            yoyo: true,
            ease: 'sine.inOut',
            delay: -5,
            duration: randomInRange(2, 8),
          }),
        ];

        el.addEventListener('mousemove', () => {
          if (dom.hoverTextContainer.style.visibility !== 'visible') {
            tweens.forEach((t) => t.pause());
            el.style.outline = '3px solid #00a606';
            dom.hoverTextContainer.style.visibility = 'visible';
          }
        });

        el.addEventListener('mouseleave', () => {
          tweens.forEach((t) => t.resume());
          el.style.outline = 'none';
          dom.hoverTextContainer.style.visibility = 'hidden';
        });
      }

      // ── Spawn leaves & observe for recycling ───────────────────
      const leafElements = [];
      for (let i = 0; i < FALLING_LEAF_COUNT; i++) {
        leafElements.push(createFallingLeaf());
      }

      const recycleObserver = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting) continue;

            const inputValue = dom.input.value;
            const nextId = LEAFLET_IDS.includes(inputValue)
              ? inputValue
              : pickRandomId();

            entry.target.src = thumbPath(nextId);
            entry.target.dataset.leafletId = nextId;
          }
        },
        { threshold: 0 },
      );

      leafElements.forEach((img) => recycleObserver.observe(img));
    </script>
  </body>
</html>
